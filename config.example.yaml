esbuild:
    printWarningsOnStderr: false

postgreSQL:
    host: 127.0.0.1
    port: 5432
    username:
    password:
    database:
    schema:

redis:
    network:
    addr: 127.0.0.1:6379
    username: 
    password:
    db:

transformer:

    # Configure just one between "lambda" and "local".

    lambda:
        accessKeyID:
        secretAccessKey:
        region:
        role:
        # Every Node and Python 3 runtime is supported.
        # See the list at https://docs.aws.amazon.com/lambda/latest/dg/lambda-runtimes.html.
        runtime:
        layer:

    local:
        # Path to the Node executable, eg. "/usr/bin/node" or simply "node".
        nodeExecutable:
        # Path to the Python executable, eg. "/usr/bin/python" or simply "python".
        pythonExecutable:
        # Language can be "node" or "python".
        language:
        # Path to the local directory which will contain the ".js" Node source
        # files (if language is "node") or the ".py" Python source files (if
        # language is "python") for the transformation functions.
        functionsDir:

telemetry:
    enable: false