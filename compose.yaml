# This Docker Compose runs a Meergo instance released on Docker Hub, along with
# the surrounding infrastructure to run it (warehouse, NATS, etc.).

services:
  meergo:
    image: meergocdp/meergo:v0.25.0
    command: -init-db-if-empty -init-docker-member
    restart: on-failure
    ports:
      - ${KRENALIS_DOCKER_COMPOSE_PORT-2022}:2022
    environment:
      # For information on how to configure these environment variables and
      # enable additional features, see:
      # https://www.krenalis.com/docs/ref/compose-yaml-configuration
      #
      # Note that the recommended way to configure these variables is to use an
      # '.env' file (see https://docs.docker.com/compose/how-tos/environment-variables/variable-interpolation/#env-file)
      # rather than editing this file.
      KRENALIS_HTTP_HOST: meergo
      KRENALIS_HTTP_EXTERNAL_URL: ${KRENALIS_HTTP_EXTERNAL_URL-http://127.0.0.1:${KRENALIS_DOCKER_COMPOSE_PORT-2022}/}
      KRENALIS_PROMETHEUS_METRICS_ENABLED: ${KRENALIS_PROMETHEUS_METRICS_ENABLED-true}
      KRENALIS_TRANSFORMERS_PROVIDER: ${KRENALIS_TRANSFORMERS_PROVIDER-local}
      KRENALIS_DB_HOST: db
      KRENALIS_DB_PORT: 5432
      KRENALIS_DB_USERNAME: meergo
      KRENALIS_DB_PASSWORD: meergo
      KRENALIS_DB_DATABASE: meergo
      KRENALIS_NATS_URL: nats://nats:4222
      KRENALIS_NATS_USER: ruser
      KRENALIS_NATS_PASSWORD: T0pS3cr3t
      KRENALIS_TRANSFORMERS_LOCAL_NODEJS_EXECUTABLE: /usr/bin/node
      KRENALIS_TRANSFORMERS_LOCAL_PYTHON_EXECUTABLE: /usr/bin/python
      KRENALIS_TRANSFORMERS_LOCAL_FUNCTIONS_DIR: /var/meergo/transformation-functions
      KRENALIS_TRANSFORMERS_LOCAL_DOAS_USER: transformeruser
      KRENALIS_CONNECTOR_FILESYSTEM_ROOT: /var/meergo/storage
      KRENALIS_CONNECTOR_FILESYSTEM_DISPLAYED_ROOT: ${PWD}/storage

    volumes:
      - ./storage:/var/meergo/storage
      - transformation-functions:/var/meergo/transformation-functions
    depends_on:
      db:
        condition: service_healthy
      warehouse:
        condition: service_healthy

  db:
    image: postgres:18.1-alpine3.23
    environment:
      POSTGRES_USER: meergo
      POSTGRES_PASSWORD: meergo
      POSTGRES_DB: meergo
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meergo"]
      interval: 5s
      timeout: 5s
      retries: 5

  warehouse:
    image: postgres:18.1-alpine3.23
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: warehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse"]
      interval: 5s
      timeout: 5s
      retries: 5
    configs:
      - source: warehouse
        target: /docker-entrypoint-initdb.d/init.sql
    volumes:
      - warehouse:/var/lib/postgresql/data

  nats:
    image: nats:2.12-alpine3.22
    command: --jetstream --store_dir /var/lib/nats/jetstream_storage
    volumes:
      - jetstream_storage:/var/lib/nats/jetstream_storage

configs:
  warehouse:
    content: |
      CREATE USER warehouse_ro WITH PASSWORD 'warehouse_ro';
      GRANT CONNECT ON DATABASE warehouse TO warehouse_ro;
      GRANT USAGE ON SCHEMA public TO warehouse_ro;
      GRANT SELECT ON ALL TABLES IN SCHEMA public TO warehouse_ro;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO warehouse_ro;
      ALTER ROLE warehouse_ro IN DATABASE warehouse SET default_transaction_read_only = on;
      ALTER ROLE warehouse_ro IN DATABASE warehouse SET statement_timeout = '5s';
      ALTER ROLE warehouse_ro IN DATABASE warehouse SET lock_timeout = '1s';
      ALTER ROLE warehouse_ro IN DATABASE warehouse SET idle_in_transaction_session_timeout = '5s';

volumes:
  db:
  warehouse:
  jetstream_storage:
  transformation-functions:
