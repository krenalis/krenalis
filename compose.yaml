# This Docker Compose runs a Meergo instance released on Docker Hub, along with
# the surrounding infrastructure to run it (warehouse, NATS, etc.).

services:
  meergo:
    image: meergocdp/meergo:v0.25.0
    command: -init-db-if-empty -init-docker-member
    restart: on-failure
    ports:
      - ${MEERGO_DOCKER_COMPOSE_PORT-2022}:2022
    environment:
      # For information on how to configure these environment variables and
      # enable additional features, see:
      # https://www.meergo.com/docs/configuration/with-docker-compose.
      #
      # Note that the recommended way to configure these variables is to use an
      # '.env' file (see https://docs.docker.com/compose/how-tos/environment-variables/variable-interpolation/#env-file)
      # rather than editing this file.
      MEERGO_HTTP_HOST: meergo
      MEERGO_HTTP_EXTERNAL_URL: ${MEERGO_HTTP_EXTERNAL_URL-http://127.0.0.1:${MEERGO_DOCKER_COMPOSE_PORT-2022}/}
      MEERGO_PROMETHEUS_METRICS_ENABLED: ${MEERGO_PROMETHEUS_METRICS_ENABLED-true}
      MEERGO_TRANSFORMERS_PROVIDER: ${MEERGO_TRANSFORMERS_PROVIDER-local}
      MEERGO_DB_HOST: db
      MEERGO_DB_PORT: 5432
      MEERGO_DB_USERNAME: meergo
      MEERGO_DB_PASSWORD: meergo
      MEERGO_DB_DATABASE: meergo
      MEERGO_NATS_URL: nats://nats:4222
      MEERGO_NATS_USER: ruser
      MEERGO_NATS_PASSWORD: T0pS3cr3t
      MEERGO_TRANSFORMERS_LOCAL_NODEJS_EXECUTABLE: /usr/bin/node
      MEERGO_TRANSFORMERS_LOCAL_PYTHON_EXECUTABLE: /usr/bin/python
      MEERGO_TRANSFORMERS_LOCAL_FUNCTIONS_DIR: /var/meergo/transformation-functions
      MEERGO_TRANSFORMERS_LOCAL_DOAS_USER: transformeruser
      MEERGO_CONNECTOR_FILESYSTEM_ROOT: /var/meergo/storage
      MEERGO_CONNECTOR_FILESYSTEM_DISPLAYED_ROOT: ${PWD}/storage

    volumes:
      - ./storage:/var/meergo/storage
      - transformation-functions:/var/meergo/transformation-functions
    depends_on:
      db:
        condition: service_healthy
      warehouse:
        condition: service_healthy

  db:
    image: postgres:18.1-alpine3.23
    environment:
      POSTGRES_USER: meergo
      POSTGRES_PASSWORD: meergo
      POSTGRES_DB: meergo
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meergo"]
      interval: 5s
      timeout: 5s
      retries: 5

  warehouse:
    image: postgres:18.1-alpine3.23
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: warehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - warehouse:/var/lib/postgresql/data

  nats:
    image: nats:2.12-alpine3.22
    command: --jetstream --store_dir /var/lib/nats/jetstream_storage
    volumes:
      - jetstream_storage:/var/lib/nats/jetstream_storage

volumes:
  db:
  warehouse:
  jetstream_storage:
  transformation-functions:
