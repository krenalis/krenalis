
{% macro Copy() %}
<div class="copy-request" aria-label="Click to copy" data-microtip-position="left" role="tooltip">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#fff" viewBox="0 0 16 16">
    <path d="M9.5 0a.5.5 0 0 1 .5.5.5.5 0 0 0 .5.5.5.5 0 0 1 .5.5V2a.5.5 0 0 1-.5.5h-5A.5.5 0 0 1 5 2v-.5a.5.5 0 0 1 .5-.5.5.5 0 0 0 .5-.5.5.5 0 0 1 .5-.5z"/>
    <path d="M3.5 1h.585A1.5 1.5 0 0 0 4 1.5V2a1.5 1.5 0 0 0 1.5 1.5h5A1.5 1.5 0 0 0 12 2v-.5q-.001-.264-.085-.5h.585A1.5 1.5 0 0 1 14 2.5v12a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 2 14.5v-12A1.5 1.5 0 0 1 3.5 1"/>
  </svg>
</div>
{% end macro %}

{% macro JS() %}
<script>
  (function() {
    document.querySelectorAll('.api-request-box .copy-request').forEach(element => {
      element.addEventListener('click', async (event) => {
        const t = event.currentTarget;
		    const text = t.closest('.api-request-box').querySelector('code').textContent.trim().replace(/\u00A0/g, ' ');
		    try {
			    await navigator.clipboard.writeText(text);
			    const label = t.getAttribute('aria-label');
			    t.setAttribute('aria-label', 'Copied');
			    t.addEventListener('mouseleave', () => { t.setAttribute('aria-label', label) }, { once: true });
		    } catch (err) {
				  console.error('cannot copy:', err);
		    }
      });
    });
  })();
</script>
{% end macro %}
