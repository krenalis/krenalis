apiVersion: 1

# Secrets below are interpolated from environment variables passed to the
# Grafana container (see 'compose.dev.yaml' and '.env.example'). If a
# variable is left unset, that channel's notifications will simply fail to
# deliver (visible in Grafana's alerting UI) rather than blocking the other
# channel.
contactPoints:
  - orgId: 1
    name: Organization Network Usage Alerts
    receivers:
      - uid: org-network-usage-slack
        type: slack
        settings:
          url: $GRAFANA_ALERT_SLACK_WEBHOOK_URL
      - uid: org-network-usage-email
        type: email
        settings:
          addresses: $GRAFANA_ALERT_EMAIL_ADDRESSES
          singleEmail: true
