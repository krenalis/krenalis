# This Docker Compose is intended to run ONLY the INFRASTRUCTURE needed by
# Krenalis during development (database, NATS, monitoring, etc.), NOT KRENALIS
# ITSELF, which must be compiled and run separately as a process on the host
# system.
#
# Running this Compose, you get:
#
# =============================================================================
# Krenalis PostgreSQL database
# -----------------------------------------------------------------------------
#
#     Host:                 127.0.0.1
#     Port:                 15432
#     Username:             krenalis
#     Password:             no password set (auth method = trust)
#     Database:             krenalis
#     Connecting from CLI:  psql -h 127.0.0.1 -p 15432 -U krenalis krenalis
#
# =============================================================================
# Krenalis PostgreSQL warehouse
# -----------------------------------------------------------------------------
#
#     Host:                 127.0.0.1
#     Port:                 15433
#     Username:             warehouse
#     Password:             no password set (auth method = trust)
#     Database:             warehouse
#     Connecting from CLI:  psql -h 127.0.0.1 -p 15433 -U warehouse warehouse
#
# =============================================================================
# Krenalis PostgreSQL warehouse (MCP user)
# -----------------------------------------------------------------------------
#
#     Host:                 127.0.0.1
#     Port:                 15433
#     Username:             warehouse_ro
#     Password:             no password set (auth method = trust)
#     Database:             warehouse
#     Connecting from CLI:  psql -h 127.0.0.1 -p 15433 -U warehouse_ro warehouse
#
# =============================================================================
# NATS
# -----------------------------------------------------------------------------
#
#     URL:       nats://127.0.0.1:4222
#     User:      ruser
#     Password:  T0pS3cr3t
#
# =============================================================================
# Prometheus
# -----------------------------------------------------------------------------
#
#     Scrapes metrics at:  http://localhost:2022/metrics
#     Exposes:             http://127.0.0.1:9090
#     Configuration:       ./tools/compose/prometheus/prometheus.yml
#
# =============================================================================
# Grafana
# -----------------------------------------------------------------------------
#
#     Panel:         http://127.0.0.1:3000  (credentials: admin/admin)
#     Dashboards:    ./tools/compose/grafana/dashboards
#     Data sources:  ./tools/compose/grafana/provisioning/datasources
#
# =============================================================================
# Recommended env vars in your Krenalis .env file
# -----------------------------------------------------------------------------
#
#     KRENALIS_KMS=local:<base64-encoded 32-byte key without '=' padding>
#     KRENALIS_HTTP_HOST=0.0.0.0 # necessary for Prometheus (which must connect from a container)
#     KRENALIS_HTTP_EXTERNAL_URL=http://127.0.0.1:2022
#     KRENALIS_DB_PORT=15432
#     KRENALIS_DB_DATABASE=krenalis
#     KRENALIS_DB_USERNAME=krenalis
#     KRENALIS_NATS_URL=nats://127.0.0.1:4222
#     KRENALIS_NATS_USER=ruser
#     KRENALIS_NATS_PASSWORD=T0pS3cr3t
#     KRENALIS_PROMETHEUS_METRICS_ENABLED=true

name: krenalis-dev

services:
  db:
    image: postgres:18.1-alpine3.23
    ports:
      - 127.0.0.1:15432:5432
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: krenalis
      POSTGRES_DB: krenalis
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krenalis"]
      interval: 5s
      timeout: 5s
      retries: 5

  warehouse:
    image: postgres:18.1-alpine3.23
    ports:
      - 127.0.0.1:15433:5432
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: warehouse
      POSTGRES_DB: warehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse"]
      interval: 5s
      timeout: 5s
      retries: 5
    configs:
      - source: warehouse
        target: /docker-entrypoint-initdb.d/init.sql
    volumes:
      - warehouse:/var/lib/postgresql/data

  nats:
    image: nats:2.12-alpine3.22
    command: --jetstream --store_dir /var/lib/nats/jetstream_storage
    ports:
      - 127.0.0.1:4222:4222
    volumes:
      - jetstream_storage:/var/lib/nats/jetstream_storage

  prometheus:
    image: prom/prometheus
    ports:
      - 127.0.0.1:9090:9090
    extra_hosts:
      - "host.docker.internal:host-gateway" # for accessing Krenalis.
    volumes:
      - ./tools/compose/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - 127.0.0.1:3000:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./tools/compose/grafana/provisioning:/etc/grafana/provisioning
      - ./tools/compose/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./tools/compose/grafana/dashboards:/var/lib/grafana/dashboards
    attach: false # set to 'true' to enable Grafana logging (note: it is very verbose)

configs:
  warehouse:
    content: |
      CREATE USER warehouse_ro WITH PASSWORD 'warehouse_ro';
      GRANT CONNECT ON DATABASE warehouse TO warehouse_ro;
      GRANT USAGE ON SCHEMA public TO warehouse_ro;
      GRANT SELECT ON ALL TABLES IN SCHEMA public TO warehouse_ro;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO warehouse_ro;
      ALTER ROLE warehouse_ro IN DATABASE warehouse SET default_transaction_read_only = on;
      ALTER ROLE warehouse_ro IN DATABASE warehouse SET statement_timeout = '5s';
      ALTER ROLE warehouse_ro IN DATABASE warehouse SET lock_timeout = '1s';
      ALTER ROLE warehouse_ro IN DATABASE warehouse SET idle_in_transaction_session_timeout = '5s';

volumes:
  db:
  warehouse:
  jetstream_storage:
  transformation-functions:
