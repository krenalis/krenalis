apiVersion: 1

datasources:
  - name: Meergo (Prometheus)
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    jsonData:
      httpMethod: POST
      manageAlerts: true
      allowAsRecordingRulesTarget: true
      prometheusType: Prometheus
      prometheusVersion: 3.3.0
      cacheLevel: "Low"
      disableRecordingRules: false
      timeInterval: 10s
