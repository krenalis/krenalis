on:
  workflow_dispatch:

  # push:
  #   branches:
  #     - main

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: denoland/setup-deno@v2
        with:
          # Keep in sync with the version within "commit/commit.go".
          deno-version: v2.0.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run commit (short)
        run: go run ./commit --short
