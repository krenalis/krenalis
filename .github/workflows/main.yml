on:
  workflow_dispatch:

  # push:
  #   branches:
  #     - main

jobs:
  tests:
    # Note that 'ubuntu-latest' includes the Docker server, which is required to
    # run './commit'.
    runs-on: ubuntu-latest

    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Keep in sync with the version within ".github/workflows/send-sourcemaps-to-sentry.yml".
          # Keep in sync with the version within "Dockerfile".
          # Keep in sync with the version within "go.mod".
          go-version: "1.24"

      - uses: denoland/setup-deno@v2
        with:
          # Keep in sync with the version within "commit/commit.go".
          deno-version: v2.3.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          pip install pandas
          pip install pyarrow

      - name: go run ./commit -no-connector-tests
        env:
          # 20 should be a reasonably sufficient number to properly run all the
          # tests. We will review it in more detail when we address the issue
          # https://github.com/meergo/meergo/issues/1673.
          MEERGO_DB_MAX_CONNECTIONS: 20
        run: go run ./commit -no-connector-tests

      - uses: numtide/clean-git-action@v2
