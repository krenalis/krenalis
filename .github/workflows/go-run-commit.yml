name: Run go run ./commit

on:
  workflow_dispatch:

  # push:
  #   branches:
  #     - main

jobs:
  tests:
    # Note that 'ubuntu-latest' includes the Docker server, which is required to
    # run './commit'.
    runs-on: ubuntu-latest

    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Keep in sync with the version within ".github/workflows/send-sourcemaps-to-sentry.yml".
          # Keep in sync with the version within "Dockerfile".
          # Keep in sync with the version within "go.mod".
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          pip install pandas
          pip install pyarrow

      - name: go run ./commit
        env:
          MEERGO_TEST_GOOGLE_ANALYTICS_API_SECRET: ${{ secrets.MEERGO_TEST_GOOGLE_ANALYTICS_API_SECRET }}
          MEERGO_TEST_GOOGLE_ANALYTICS_MEASUREMENT_ID: ${{ secrets.MEERGO_TEST_GOOGLE_ANALYTICS_MEASUREMENT_ID }}
          MEERGO_TEST_GOOGLE_ANALYTICS_COLLECTION_ENDPOINT: ${{ secrets.MEERGO_TEST_GOOGLE_ANALYTICS_COLLECTION_ENDPOINT }}
          MEERGO_TEST_KLAVIYO_PRIVATE_API_KEY: ${{ secrets.MEERGO_TEST_KLAVIYO_PRIVATE_API_KEY }}
          MEERGO_TEST_MIXPANEL_PROJECT_ID: ${{ secrets.MEERGO_TEST_MIXPANEL_PROJECT_ID }}
          MEERGO_TEST_MIXPANEL_PROJECT_TOKEN: ${{ secrets.MEERGO_TEST_MIXPANEL_PROJECT_TOKEN }}
          MEERGO_TEST_MIXPANEL_DATA_RESIDENCY: ${{ secrets.MEERGO_TEST_MIXPANEL_DATA_RESIDENCY }}
        run: go run ./commit

      - uses: numtide/clean-git-action@v2
