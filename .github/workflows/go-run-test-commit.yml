name: Run go run ./test/commit

on:
  workflow_dispatch:

permissions: {}

jobs:
  tests:
    # Note that 'ubuntu-latest' includes the Docker server, which is required to
    # run './test/commit'.
    runs-on: ubuntu-latest
    environment: tests

    timeout-minutes: 40

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          # Keep in sync with the version within ".github/workflows/send-sourcemaps-to-sentry.yml".
          # Keep in sync with the version within "Dockerfile".
          # Keep in sync with the version within "go.mod".
          go-version: "1.26"

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: |
          pip install pandas
          pip install pyarrow

      - name: Get GitHub OIDC token for Snowflake
        id: get-oidc-token
        run: |
          OIDC_TOKEN=$(curl --fail --silent \
            --header "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=snowflakecomputing.com" \
            | jq --raw-output '.value')
          echo "token=$OIDC_TOKEN" >> "$GITHUB_OUTPUT"

      - name: go run ./test/commit
        env:
          KRENALIS_SNOWFLAKE_TESTER_ACCOUNT: ${{ secrets.KRENALIS_SNOWFLAKE_TESTER_ACCOUNT }}
          KRENALIS_SNOWFLAKE_TESTER_DATABASE: ${{ secrets.KRENALIS_SNOWFLAKE_TESTER_DATABASE }}
          KRENALIS_SNOWFLAKE_TESTER_ROLE: ${{ secrets.KRENALIS_SNOWFLAKE_TESTER_ROLE }}
          KRENALIS_SNOWFLAKE_TESTER_USER: ${{ secrets.KRENALIS_SNOWFLAKE_TESTER_USER }}
          KRENALIS_SNOWFLAKE_TESTER_WAREHOUSE: ${{ secrets.KRENALIS_SNOWFLAKE_TESTER_WAREHOUSE }}
          KRENALIS_SNOWFLAKE_TESTER_OIDC_TOKEN: ${{ steps.get-oidc-token.outputs.token }}
          KRENALIS_TEST_GOOGLE_ANALYTICS_API_SECRET: ${{ secrets.KRENALIS_TEST_GOOGLE_ANALYTICS_API_SECRET }}
          KRENALIS_TEST_GOOGLE_ANALYTICS_MEASUREMENT_ID: ${{ secrets.KRENALIS_TEST_GOOGLE_ANALYTICS_MEASUREMENT_ID }}
          KRENALIS_TEST_GOOGLE_ANALYTICS_COLLECTION_ENDPOINT: ${{ secrets.KRENALIS_TEST_GOOGLE_ANALYTICS_COLLECTION_ENDPOINT }}
          KRENALIS_TEST_KLAVIYO_PRIVATE_API_KEY: ${{ secrets.KRENALIS_TEST_KLAVIYO_PRIVATE_API_KEY }}
          KRENALIS_TEST_MIXPANEL_PROJECT_ID: ${{ secrets.KRENALIS_TEST_MIXPANEL_PROJECT_ID }}
          KRENALIS_TEST_MIXPANEL_PROJECT_TOKEN: ${{ secrets.KRENALIS_TEST_MIXPANEL_PROJECT_TOKEN }}
          KRENALIS_TEST_MIXPANEL_DATA_RESIDENCY: ${{ secrets.KRENALIS_TEST_MIXPANEL_DATA_RESIDENCY }}
          KRENALIS_TEST_POSTHOG_API_KEY: ${{ secrets.KRENALIS_TEST_POSTHOG_API_KEY }}
          KRENALIS_TEST_POSTHOG_PROJECT_REGION: ${{ secrets.KRENALIS_TEST_POSTHOG_PROJECT_REGION }}
        run: go run ./test/commit

      - name: Check that the repository is clean
        run: ./test/commit/repo_is_clean.bash
