<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; box-sizing: border-box; margin: 0; background-color: #fff; padding: 30px;">
<head>
    <meta name="viewport" content="width=device-width" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>You have been invited to Meergo</title>
    <style type="text/css">
    .title {
        font-size: 19px;
        font-weight: 600;
        text-align: center;
    }
    .message {
        text-align: center;
    }
    .join-button {
        text-decoration: none;
        background-color: #4f46e5;
        border-radius: 3px;
        display: block;
        margin: auto;
        max-width: 150px;
        text-align: center;
        color: #fff!important;
        padding: 10px 15px;
        font-size: 14px;
    }
    </style>
    </head>
<body itemscope itemtype="http://schema.org/EmailMessage" style="font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; box-sizing: border-box; background-color: #fff; -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: none; width: 100% !important; height: 100%; padding: 30px; " bgcolor="#fff">
    <div class="title">You have been invited to Meergo</div>
    <p class="message">${invitationFrom} has invited you to sign up for their organization (${organization}) in Meergo</p>
    <a class="join-button" href="https://localhost:9090/admin/sign-up/${token}">Sign up</a>
</body>
</html>
